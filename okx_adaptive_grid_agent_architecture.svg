<rect x="310" y="612" width="120" height="20" rx="5" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="370" y="622" text-anchor="middle" dominant-baseline="central" class="badge">Shift Center</text>

<rect x="442" y="612" width="130" height="20" rx="5" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="507" y="622" text-anchor="middle" dominant-baseline="central" class="badge">Reduce Exposure</text>

<rect x="584" y="612" width="100" height="20" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="0.5"/>
<text x="634" y="622" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:500;fill:#fca5a5">Emergency</text>

