<svg width="100%" viewBox="0 0 720 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { font-size: 14px; font-weight: 600; fill: #b5d4f4; }
    .subtitle { font-size: 11px; fill: #85b7eb; }
    .badge { font-size: 11px; font-weight: 500; fill: #5dcaa5; }
    .agent-label { font-size: 11px; font-weight: 600; fill: #f0f0f0; }
    .agent-sub { font-size: 9px; fill: #aaa; }
    .action-text { font-size: 10px; font-weight: 500; }
    .arrow-line { stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  </style>
</defs>

<!-- Background -->
<rect width="720" height="820" rx="12" fill="#0d1117"/>

<!-- ═══ Layer 1: Data ═══ -->
<rect x="20" y="16" width="680" height="72" rx="10" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="36" y="38" class="title">Data Layer</text>
<text x="36" y="52" class="subtitle">OKX Public API (REST)</text>

<rect x="36" y="58" width="120" height="22" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="96" y="69" text-anchor="middle" dominant-baseline="central" class="badge">Candles (1m)</text>

<rect x="168" y="58" width="120" height="22" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="228" y="69" text-anchor="middle" dominant-baseline="central" class="badge">Ticker / Price</text>

<rect x="300" y="58" width="120" height="22" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="360" y="69" text-anchor="middle" dominant-baseline="central" class="badge">Fills History</text>

<rect x="432" y="58" width="140" height="22" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="502" y="69" text-anchor="middle" dominant-baseline="central" class="badge">Grid Bot Status</text>

<!-- Arrow: Data → Analyzer -->
<line x1="360" y1="88" x2="360" y2="108" class="arrow-line" stroke="#85b7eb"/>

<!-- ═══ Layer 2: Analysis ═══ -->
<rect x="20" y="108" width="680" height="100" rx="10" fill="#1a1a2e" stroke="#7c3aed" stroke-width="0.5"/>
<text x="36" y="130" class="title" fill="#c4b5fd">Analysis Layer</text>
<text x="36" y="144" class="subtitle" fill="#a78bfa">market_analyzer.py — Risk Score + Trend Detection</text>

<rect x="36" y="155" width="100" height="40" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="0.5"/>
<text x="86" y="171" text-anchor="middle" class="agent-label" fill="#c4b5fd">ATR</text>
<text x="86" y="183" text-anchor="middle" class="agent-sub" fill="#a78bfa">30pts max</text>

<rect x="148" y="155" width="100" height="40" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="0.5"/>
<text x="198" y="171" text-anchor="middle" class="agent-label" fill="#c4b5fd">RSI</text>
<text x="198" y="183" text-anchor="middle" class="agent-sub" fill="#a78bfa">25pts max</text>

<rect x="260" y="155" width="100" height="40" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="0.5"/>
<text x="310" y="171" text-anchor="middle" class="agent-label" fill="#c4b5fd">Bollinger</text>
<text x="310" y="183" text-anchor="middle" class="agent-sub" fill="#a78bfa">25pts max</text>

<rect x="372" y="155" width="100" height="40" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="0.5"/>
<text x="422" y="171" text-anchor="middle" class="agent-label" fill="#c4b5fd">Volume</text>
<text x="422" y="183" text-anchor="middle" class="agent-sub" fill="#a78bfa">20pts max</text>

<rect x="484" y="155" width="100" height="40" rx="6" fill="#1b4332" stroke="#2dd4bf" stroke-width="0.5"/>
<text x="534" y="171" text-anchor="middle" class="agent-label" fill="#2dd4bf">EMA 9/21</text>
<text x="534" y="183" text-anchor="middle" class="agent-sub" fill="#5eead4">Trend Dir</text>

<rect x="596" y="155" width="88" height="40" rx="6" fill="#1b4332" stroke="#2dd4bf" stroke-width="0.5"/>
<text x="640" y="171" text-anchor="middle" class="agent-label" fill="#2dd4bf">ADX</text>
<text x="640" y="183" text-anchor="middle" class="agent-sub" fill="#5eead4">Strength</text>

<!-- Arrow: Analyzer → Decision -->
<line x1="360" y1="208" x2="360" y2="228" class="arrow-line" stroke="#a78bfa"/>

<!-- ═══ Layer 3: Multi-Agent Consensus ═══ -->
<rect x="20" y="228" width="680" height="220" rx="10" fill="#1c1917" stroke="#f59e0b" stroke-width="0.5"/>
<text x="36" y="250" class="title" fill="#fcd34d">Multi-Agent Consensus</text>
<text x="36" y="264" class="subtitle" fill="#fbbf24">multi_agent.py — 4 Specialists + Coordinator</text>

<!-- 4 Agents -->
<rect x="36" y="278" width="145" height="60" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="0.5"/>
<text x="108" y="300" text-anchor="middle" class="agent-label">Technical Analyst</text>
<text x="108" y="314" text-anchor="middle" class="agent-sub">EMA, ATR, BB, RSI</text>
<text x="108" y="326" text-anchor="middle" class="agent-sub">chart patterns</text>

<rect x="193" y="278" width="145" height="60" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="0.5"/>
<text x="265" y="300" text-anchor="middle" class="agent-label">Sentiment Analyst</text>
<text x="265" y="314" text-anchor="middle" class="agent-sub">volume, panic/FOMO</text>
<text x="265" y="326" text-anchor="middle" class="agent-sub">market psychology</text>

<rect x="350" y="278" width="145" height="60" rx="8" fill="#991b1b" stroke="#ef4444" stroke-width="0.8"/>
<text x="422" y="300" text-anchor="middle" class="agent-label">Risk Manager</text>
<text x="422" y="314" text-anchor="middle" class="agent-sub">capital preservation</text>
<text x="422" y="326" text-anchor="middle" style="font-size:9px;font-weight:700;fill:#fca5a5">2x VOTE WEIGHT</text>

<rect x="507" y="278" width="145" height="60" rx="8" fill="#7c2d12" stroke="#f97316" stroke-width="0.5"/>
<text x="579" y="300" text-anchor="middle" class="agent-label">Macro Strategist</text>
<text x="579" y="314" text-anchor="middle" class="agent-sub">trend cycle, ADX</text>
<text x="579" y="326" text-anchor="middle" class="agent-sub">big picture</text>

<!-- Arrows to Coordinator -->
<line x1="108" y1="338" x2="340" y2="380" class="arrow-line" stroke="#f59e0b"/>
<line x1="265" y1="338" x2="340" y2="380" class="arrow-line" stroke="#f59e0b"/>
<line x1="422" y1="338" x2="380" y2="380" class="arrow-line" stroke="#ef4444" stroke-width="2"/>
<line x1="579" y1="338" x2="380" y2="380" class="arrow-line" stroke="#f59e0b"/>

<!-- Coordinator -->
<rect x="260" y="375" width="200" height="50" rx="10" fill="#92400e" stroke="#fbbf24" stroke-width="1"/>
<text x="360" y="396" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#fef3c7">Coordinator</text>
<text x="360" y="412" text-anchor="middle" class="agent-sub" fill="#fcd34d">majority + defense bias</text>

<!-- Arrow: Coordinator → Decision -->
<line x1="360" y1="425" x2="360" y2="458" class="arrow-line" stroke="#fbbf24"/>

<!-- ═══ Layer 4: Decision Engine ═══ -->
<rect x="20" y="458" width="680" height="90" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="0.5"/>
<text x="36" y="480" class="title" fill="#93c5fd">Decision Engine</text>
<text x="36" y="494" class="subtitle" fill="#60a5fa">main_agent.py — State Machine + Trend Override</text>

<rect x="36" y="504" width="90" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="81" y="519" text-anchor="middle" class="action-text" fill="#22c55e">MAINTAIN</text>

<rect x="138" y="504" width="75" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
