<rect x="225" y="504" width="75" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="262" y="519" text-anchor="middle" class="action-text" fill="#f97316">PAUSE</text>

<rect x="312" y="504" width="65" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="344" y="519" text-anchor="middle" class="action-text" fill="#ef4444">STOP</text>

<rect x="389" y="504" width="80" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="429" y="519" text-anchor="middle" class="action-text" fill="#eab308">REDUCE</text>

<rect x="481" y="504" width="90" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="526" y="519" text-anchor="middle" class="action-text" fill="#2dd4bf">SHIFT UP</text>

<rect x="583" y="504" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>
<text x="633" y="519" text-anchor="middle" class="action-text" fill="#2dd4bf">SHIFT DOWN</text>

<!-- Arrow: Decision → Execution -->
<line x1="360" y1="548" x2="360" y2="568" class="arrow-line" stroke="#3b82f6"/>

<!-- ═══ Layer 5: Execution ═══ -->
<rect x="20" y="568" width="680" height="72" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="0.5"/>
<text x="36" y="590" class="title" fill="#a7f3d0">Execution Layer</text>
<text x="36" y="604" class="subtitle" fill="#6ee7b7">grid_controller.py — OKX Trading Bot API</text>

<rect x="36" y="612" width="130" height="20" rx="5" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="101" y="622" text-anchor="middle" dominant-baseline="central" class="badge">Start / Stop Grid</text>

<rect x="178" y="612" width="120" height="20" rx="5" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
