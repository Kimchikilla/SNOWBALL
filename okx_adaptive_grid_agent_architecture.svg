<rect x="20" y="660" width="680" height="72" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="0.5"/>
<text x="36" y="682" class="title" fill="#c7d2fe">Notification Layer</text>
<text x="36" y="696" class="subtitle" fill="#a5b4fc">Telegram Alerts + Daily Report</text>

<rect x="36" y="704" width="130" height="20" rx="5" fill="#312e81" stroke="#818cf8" stroke-width="0.5"/>
<text x="101" y="714" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#c7d2fe">Trade Fills Alert</text>

<rect x="178" y="704" width="150" height="20" rx="5" fill="#312e81" stroke="#818cf8" stroke-width="0.5"/>
<text x="253" y="714" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#c7d2fe">State Change Alert</text>

<rect x="340" y="704" width="160" height="20" rx="5" fill="#312e81" stroke="#818cf8" stroke-width="0.5"/>
<text x="420" y="714" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#c7d2fe">Consensus Report</text>

<rect x="512" y="704" width="140" height="20" rx="5" fill="#312e81" stroke="#818cf8" stroke-width="0.5"/>
<text x="582" y="714" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#c7d2fe">Daily PnL Report</text>

<!-- ═══ Loop indicator ═══ -->
<rect x="250" y="752" width="220" height="36" rx="18" fill="#1f2937" stroke="#6b7280" stroke-width="0.5"/>
<text x="360" y="770" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#9ca3af">Loop every 2 min</text>

<!-- Loop arrow -->
<path d="M 690 770 Q 710 770 710 400 Q 710 120 690 120" fill="none" stroke="#4b5563" stroke-width="1" stroke-dasharray="4 3"/>
<path d="M 690 120 L 686 128 M 690 120 L 694 128" fill="none" stroke="#4b5563" stroke-width="1"/>

<!-- ═══ Footer ═══ -->
<text x="360" y="808" text-anchor="middle" style="font-size:10px;fill:#4b5563">Snowball — OKX Adaptive Grid Trading Agent</text>
